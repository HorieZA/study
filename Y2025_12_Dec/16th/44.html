<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BBH+Bogle&family=Nanum+Myeongjo&display=swap" rel="stylesheet">
</head>
<style>
    body {
        background-color: #ffdddd;
    }

    .cnt3 {
        padding-bottom: 64px;
    }

    .cnt2 {
        text-align: center;
        padding-left: 20%;
        padding-right: 20%;
    }

    .mg2 {
        width: 100%;
        margin: 32px 0;
        opacity: 0.8;
        filter: grayscale(50%);
        border-radius: 10px;
    }

    .bn {
        color: #fff;
        background-color: #000;
        font-size: 18px;
        padding: 12px 18px;
        border-radius: 8px;
    }

    .grey {
        color: #757575;
    }

    h1 h2 {
        font-family: "Raleway", sans-serif;
    }

    .haf {
        width: 49.99999%;
        float: left;
    }
</style>

<body>
    <div class="cnt3">
        <div class="cnt2">
            <h1 class="grey">THE WEDDING</h1>
            <img class="mg2" src="../../images/bg4.jpg">
            <div>
                <div class="haf">
                    <h2>When</h2>
                    <p>Wedding Ceremony - 2:00pm</p>
                    <p>Reception &amp; Dinner - 5:00pm</p>
                </div>
                <div class="haf">
                    <h2>Where</h2>
                    <p>Some place, an address</p>
                    <p>Some where, some address</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
