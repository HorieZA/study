apiVersion: v1
kind: ConfigMap

metadata:
  name: app1-config

data:
  APP1_PATH: "/app1"
  APP2_PATH: "/app2"
  APP1_URL: "http://app2-service:8000"
  APP2_URL: "http://app3-service:8000"

# 등록하기
# kubectl create -f app1-config.yaml

# 삭제하기
# kubectl delete -f app1-config.yaml

# 확인하기
# kubectl get configmaps